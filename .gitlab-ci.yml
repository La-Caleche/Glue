image: gradle:8.10.2-jdk21-alpine

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

stages:
  - build

build:
  stage: build
  script:
    - ./gradlew --build-cache --refresh-dependencies clean :glue-core:publish :glue-render:publish :glue-lumos:publish :glue-showcase:publish
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    paths:
      - build/libs/*.jar
  only:
    - tags
