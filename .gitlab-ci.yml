image: eclipse-temurin:21-jdk

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  # Keep Gradle's dependency/wrapper cache inside the project dir so GitLab can cache it.
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-home"

default:
  cache:
    key: gradle-home
    paths:
      - .gradle-home/caches/modules-2
      - .gradle-home/wrapper

stages:
  - check
  - publish

check:
  stage: check
  script:
    # build/check are blocked by a PMD snapshot in the caldle plugin; test + remapJar is the gate
    # (remapJar also validates resource expansion and jar packaging).
    - ./gradlew test remapJar
  rules:
    - if: $CI_COMMIT_BRANCH

publish:
  stage: publish
  script:
    - ./gradlew test
        :glue-core:publish
        :glue-render:publish
        :glue-lumos:publish
        :glue-lumos-client:publish
        :glue-showcase:remapJar
  artifacts:
    paths:
      - build/libs/*.jar
  rules:
    - if: $CI_COMMIT_TAG
